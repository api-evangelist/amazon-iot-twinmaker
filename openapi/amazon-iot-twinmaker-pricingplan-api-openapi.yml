security:
- hmac: []
tags:
- name: Pricingplan
paths:
  /pricingplan:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    get:
      operationId: GetPricingPlan
      description: Gets the pricing plan.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPricingPlanResponse'
        '480':
          description: InternalServerException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerException'
        '481':
          description: AccessDeniedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedException'
        '482':
          description: ThrottlingException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThrottlingException'
        '483':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
      parameters: []
      summary: Amazon IoT TwinMaker Get Pricing Plan
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - Pricingplan
    post:
      operationId: UpdatePricingPlan
      description: Update the pricing plan.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdatePricingPlanResponse'
        '480':
          description: InternalServerException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerException'
        '481':
          description: AccessDeniedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedException'
        '482':
          description: ThrottlingException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThrottlingException'
        '483':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - pricingMode
              properties:
                pricingMode:
                  description: The pricing mode.
                  type: string
                  enum:
                  - BASIC
                  - STANDARD
                  - TIERED_BUNDLE
                bundleNames:
                  description: The bundle names.
                  type: array
                  items:
                    $ref: '#/components/schemas/BundleName'
                  minItems: 1
                  maxItems: 10
      summary: Amazon IoT TwinMaker Update Pricing Plan
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - Pricingplan
components:
  parameters:
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
    X-Amz-Security-Token:
      name: X-Amz-Security-Token
      in: header
      schema:
        type: string
      required: false
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
    X-Amz-Algorithm:
      name: X-Amz-Algorithm
      in: header
      schema:
        type: string
      required: false
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
    X-Amz-Content-Sha256:
      name: X-Amz-Content-Sha256
      in: header
      schema:
        type: string
      required: false
    X-Amz-Signature:
      name: X-Amz-Signature
      in: header
      schema:
        type: string
      required: false
  schemas:
    PricingMode:
      type: string
      enum:
      - BASIC
      - STANDARD
      - TIERED_BUNDLE
    BundleInformation:
      type: object
      required:
      - bundleNames
      properties:
        bundleNames:
          allOf:
          - $ref: '#/components/schemas/PricingBundles'
          - description: The bundle names.
        pricingTier:
          allOf:
          - $ref: '#/components/schemas/PricingTier'
          - description: The pricing tier.
      description: Information about the pricing bundle.
    UpdateReason:
      type: string
      enum:
      - DEFAULT
      - PRICING_TIER_UPDATE
      - ENTITY_COUNT_UPDATE
      - PRICING_MODE_UPDATE
      - OVERWRITTEN
    GetPricingPlanResponse:
      type: object
      required:
      - currentPricingPlan
      properties:
        currentPricingPlan:
          allOf:
          - $ref: '#/components/schemas/PricingPlan'
          - description: The chosen pricing plan for the current billing cycle.
        pendingPricingPlan:
          allOf:
          - $ref: '#/components/schemas/PricingPlan'
          - description: The pending pricing plan.
    AccessDeniedException: {}
    PricingTier:
      type: string
      enum:
      - TIER_1
      - TIER_2
      - TIER_3
      - TIER_4
    BundleName:
      type: string
      pattern: .*
      minLength: 1
      maxLength: 256
    UpdatePricingPlanResponse:
      type: object
      required:
      - currentPricingPlan
      properties:
        currentPricingPlan:
          allOf:
          - $ref: '#/components/schemas/PricingPlan'
          - description: Update the current pricing plan.
        pendingPricingPlan:
          allOf:
          - $ref: '#/components/schemas/PricingPlan'
          - description: Update the pending pricing plan.
    PricingBundles:
      type: array
      items:
        $ref: '#/components/schemas/BundleName'
      minItems: 1
      maxItems: 10
    ThrottlingException: {}
    ValidationException: {}
    Long:
      type: integer
    Timestamp:
      type: string
      description: supports epoch seconds value
      format: date-time
    InternalServerException: {}
    PricingPlan:
      type: object
      required:
      - effectiveDateTime
      - pricingMode
      - updateDateTime
      - updateReason
      properties:
        billableEntityCount:
          allOf:
          - $ref: '#/components/schemas/Long'
          - description: The billable entity count.
        bundleInformation:
          allOf:
          - $ref: '#/components/schemas/BundleInformation'
          - description: The pricing plan's bundle information.
        effectiveDateTime:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The effective date and time of the pricing plan.
        pricingMode:
          allOf:
          - $ref: '#/components/schemas/PricingMode'
          - description: The pricing mode.
        updateDateTime:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The set date and time for updating a pricing plan.
        updateReason:
          allOf:
          - $ref: '#/components/schemas/UpdateReason'
          - description: The update reason for changing a pricing plan.
      description: The pricing plan.
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4
externalDocs:
  description: Amazon Web Services documentation
  url: https://docs.aws.amazon.com/iottwinmaker/
x-hasEquivalentPaths: true
