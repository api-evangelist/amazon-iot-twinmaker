security:
- hmac: []
tags:
- name: Queries
paths:
  /queries/execution:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: ExecuteQuery
      description: Run queries to access information from your knowledge graph of entities within individual workspaces.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecuteQueryResponse'
        '480':
          description: InternalServerException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerException'
        '481':
          description: AccessDeniedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedException'
        '482':
          description: QueryTimeoutException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryTimeoutException'
        '483':
          description: ThrottlingException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThrottlingException'
        '484':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
        '485':
          description: ServiceQuotaExceededException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceQuotaExceededException'
      parameters:
      - name: maxResults
        in: query
        schema:
          type: string
        description: Pagination limit
        required: false
      - name: nextToken
        in: query
        schema:
          type: string
        description: Pagination token
        required: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - workspaceId
              - queryStatement
              properties:
                workspaceId:
                  description: The ID of the workspace.
                  type: string
                  pattern: '[a-zA-Z_0-9][a-zA-Z_\-0-9]*[a-zA-Z0-9]+'
                  minLength: 1
                  maxLength: 128
                queryStatement:
                  description: The query statement.
                  type: string
                  pattern: '[\s\S]+'
                  minLength: 1
                  maxLength: 1000
                maxResults:
                  description: '<p>The maximum number of results to return at one time. The default is 25.</p> <p>Valid Range: Minimum value of 1. Maximum value of 250.</p>'
                  type: integer
                  minimum: 1
                  maximum: 100
                nextToken:
                  description: The string that specifies the next page of results.
                  type: string
                  pattern: .*
                  minLength: 0
                  maxLength: 17880
      summary: Amazon IoT TwinMaker Execute Query
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - Queries
components:
  parameters:
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
    X-Amz-Security-Token:
      name: X-Amz-Security-Token
      in: header
      schema:
        type: string
      required: false
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
    X-Amz-Algorithm:
      name: X-Amz-Algorithm
      in: header
      schema:
        type: string
      required: false
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
    X-Amz-Content-Sha256:
      name: X-Amz-Content-Sha256
      in: header
      schema:
        type: string
      required: false
    X-Amz-Signature:
      name: X-Amz-Signature
      in: header
      schema:
        type: string
      required: false
  schemas:
    Row:
      type: object
      properties:
        rowData:
          allOf:
          - $ref: '#/components/schemas/RowData'
          - description: The data in a row of query results.
      description: Represents a single row in the query results.
    ColumnDescriptions:
      type: array
      items:
        $ref: '#/components/schemas/ColumnDescription'
    ServiceQuotaExceededException: {}
    NextToken:
      type: string
      pattern: .*
      minLength: 0
      maxLength: 17880
    ColumnType:
      type: string
      enum:
      - NODE
      - EDGE
      - VALUE
    ExecuteQueryResponse:
      type: object
      properties:
        columnDescriptions:
          allOf:
          - $ref: '#/components/schemas/ColumnDescriptions'
          - description: A list of ColumnDescription objects.
        rows:
          allOf:
          - $ref: '#/components/schemas/Rows'
          - description: Represents a single row in the query results.
        nextToken:
          allOf:
          - $ref: '#/components/schemas/NextToken'
          - description: The string that specifies the next page of results.
    AccessDeniedException: {}
    ColumnDescription:
      type: object
      properties:
        name:
          allOf:
          - $ref: '#/components/schemas/ColumnName'
          - description: The name of the column description.
        type:
          allOf:
          - $ref: '#/components/schemas/ColumnType'
          - description: The type of the column description.
      description: A description of the column in the query results.
    QueryTimeoutException: {}
    RowData:
      type: array
      items:
        $ref: '#/components/schemas/QueryResultValue'
    ThrottlingException: {}
    Rows:
      type: array
      items:
        $ref: '#/components/schemas/Row'
    QueryResultValue:
      type: object
      properties: {}
    ValidationException: {}
    InternalServerException: {}
    ColumnName:
      type: string
      pattern: .*
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4
externalDocs:
  description: Amazon Web Services documentation
  url: https://docs.aws.amazon.com/iottwinmaker/
x-hasEquivalentPaths: true
